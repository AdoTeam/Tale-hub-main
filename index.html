<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tale HUB</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html{
    scroll-behavior:smooth;
}

/* BACKGROUND (NO DARK FILTER) */
body{
    background:url("pexels-codioful-7130542.jpg") center/cover no-repeat fixed;
    color:white;
}

/* NAV ALWAYS TOP */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:9999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 50px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

nav ul{
    display:flex;
    gap:20px;
    list-style:none;
}

nav a{
    color:white;
    text-decoration:none;
}

/* TALE+ */
.taleplus{
    padding:8px 14px;
    background:#00aaff;
    border-radius:8px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.title{
    font-size:80px;
    font-weight:900;
    background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet,red);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rainbow 6s linear infinite;
}

@keyframes rainbow{
    0%{background-position:0%}
    100%{background-position:400%}
}

/* PRODUCTS */
.section{
    padding:100px 50px;
}

.panel{
    background:rgba(255,255,255,0.08);
    border-radius:18px;
    padding:40px;
    backdrop-filter:blur(10px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.25); /* çok hafif, karartma yok */
    z-index:99999;
}

.modal-box{
    width:700px;
    background:rgba(20,20,20,0.9);
    border-radius:16px;
    display:flex;
    overflow:hidden;
    position:relative;
}

/* LEFT */
.modal-left{
    flex:1;
    padding:25px;
}

.modal-left h2{
    margin-bottom:10px;
}

.modal-left p{
    color:#ccc;
    line-height:1.5;
}

/* RIGHT IMAGE */
.modal-right{
    width:280px;
}

.modal-right img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BUTTONS */
.btn-row{
    margin-top:20px;
    display:flex;
    gap:10px;
}

.buy-btn{
    background:#00ff7b;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.dc-btn{
    background:#5865F2;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

/* CLOSE */
.close{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:22px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div>Tale HUB</div>

    <ul>
        <li><a href="#products">Products</a></li>
        <li><a href="#info">Info</a></li>
        <li class="taleplus">Tale+</li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h1 class="title">TALE HUB</h1>
</section>

<!-- PRODUCTS -->
<section id="products" class="section">
<div class="panel">

<div class="grid">

<div class="card" onclick="openModal('Product 1','This is a cool product description.','$19.99','https://picsum.photos/400?1')">
<img src="https://picsum.photos/400?1">
<div class="card-content">
<h3>Product 1</h3>
</div>
</div>

<div class="card" onclick="openModal('Product 2','Another product description here.','$29.99','https://picsum.photos/400?2')">
<img src="https://picsum.photos/400?2">
<div class="card-content">
<h3>Product 2</h3>
</div>
</div>

<div class="card" onclick="openModal('Product 3','Best product ever.','$39.99','https://picsum.photos/400?3')">
<img src="https://picsum.photos/400?3">
<div class="card-content">
<h3>Product 3</h3>
</div>
</div>

</div>
</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-box">

<div class="close" onclick="closeModal()">×</div>

<!-- LEFT -->
<div class="modal-left">
<h2 id="mTitle"></h2>
<p id="mDesc"></p>
<h3 id="mPrice" style="margin-top:10px;color:#00ff7b;"></h3>

<div class="btn-row">
<button class="buy-btn" onclick="window.open('https://github.com')">Buy</button>
<button class="dc-btn" onclick="window.open('https://discord.com')">Discord</button>
</div>
</div>

<!-- RIGHT -->
<div class="modal-right">
<img id="mImg">
</div>

</div>

</div>

<script>
function openModal(title, desc, price, img){
    document.getElementById("modal").style.display="flex";
    document.getElementById("mTitle").innerText=title;
    document.getElementById("mDesc").innerText=desc;
    document.getElementById("mPrice").innerText=price;
    document.getElementById("mImg").src=img;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
    if(e.target.id==="modal"){
        closeModal();
    }
}
</script>

</body>
</html>
