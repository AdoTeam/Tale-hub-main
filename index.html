<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tale HUB</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
}

/* ÜST MENÜ */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    z-index:1000;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.nav-links a:hover{
    color:#00ffff;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* RENK AKIŞLI YAZI */
.title{
    font-size:90px;
    font-weight:900;
    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:rainbow 6s linear infinite;

    filter:drop-shadow(0 0 15px rgba(255,255,255,.5));
}

@keyframes rainbow{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

.subtitle{
    margin-top:15px;
    color:#bdbdbd;
    font-size:22px;
}

.buttons{
    margin-top:35px;
    display:flex;
    gap:20px;
}

.btn{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.buy{
    background:linear-gradient(45deg,#00ffff,#0099ff);
    color:white;
}

.info{
    background:#1a1a1a;
    color:white;
    border:1px solid #333;
}

.btn:hover{
    transform:translateY(-4px);
}
</style>
</head>

<body>

<nav>
    <div class="logo">Tale HUB</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Info</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">

    <h1 class="title">TALE HUB</h1>

    <p class="subtitle">
        Powerful • Modern • Fast
    </p>

    <div class="buttons">
        <button class="btn buy">Buy</button>
        <button class="btn info">Info</button>
    </div>

</section>

</body>
</html>
